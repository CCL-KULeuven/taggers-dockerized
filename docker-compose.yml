services:
    # spacy (ports: 812x)
    spacy-nl:
        image: ccl-kuleuven/taggers-dockerized-spacy:${VERSION}
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=nl_core_news_lg
        restart: unless-stopped
        ports:
            - 8120:8080

    spacy-en:
        image: ccl-kuleuven/taggers-dockerized-spacy:${VERSION}
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=en_core_web_lg
        restart: unless-stopped
        ports:
            - 8121:8080

    spacy-fr:
        image: ccl-kuleuven/taggers-dockerized-spacy:${VERSION}
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=fr_core_news_lg
        restart: unless-stopped
        ports:
            - 8122:8080

    spacy-de:
        image: ccl-kuleuven/taggers-dockerized-spacy:${VERSION}
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=de_core_news_lg
        restart: unless-stopped
        ports:
            - 8123:8080
    # LeTs (ports: 813x)
    lets-nl:
        image: ccl-kuleuven/taggers-dockerized-lets-nl:${VERSION}
        build:
            context: lets/base
        networks:
            - taggers-network
        environment:
            - LETS_LANG=nl
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8130:8080
    lets-fr:
        image: ccl-kuleuven/taggers-dockerized-lets-fr:${VERSION}
        build:
            context: lets/base
        networks:
            - taggers-network
        environment:
            - LETS_LANG=fr
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8131:8080
    lets-de:
        image: ccl-kuleuven/taggers-dockerized-lets-de:${VERSION}
        build:
            context: lets/base
        networks:
            - taggers-network
        environment:
            - LETS_LANG=de
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8132:8080
    lets-en:
        image: ccl-kuleuven/taggers-dockerized-lets-en:${VERSION}
        build:
            context: lets/base
        networks:
            - taggers-network
        environment:
            - LETS_LANG=en
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8133:8080

    # Lettuce (ports: 814x)
    lettuce-nl-mono:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_nl_mono
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8140:8080
    lettuce-nl-xlm:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_nl_xlm
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8141:8080
    lettuce-de-mono:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        build:
            context: huggingface/lettuce
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_de_mono

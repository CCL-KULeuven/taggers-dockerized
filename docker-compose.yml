            - 8142:8080
    lettuce-de-xlm:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        build:
            context: huggingface/lettuce
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_de_xlm
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8143:8080
    lettuce-fr-mono:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        build:
            context: huggingface/lettuce
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_fr_mono
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8144:8080
    lettuce-fr-xlm:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        build:
            context: huggingface/lettuce
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_fr_xlm
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8145:8080

    lettuce-en-mono:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        build:
            context: huggingface/lettuce
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_en_mono
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8146:8080
    lettuce-en-xlm:
        image: ccl-kuleuven/taggers-dockerized-lettuce:${VERSION}
        build:
            context: huggingface/lettuce
        networks:
            - taggers-network
        environment:
            - HUGGINGFACE_MODEL=pranaydeeps/lettuce_pos_en_xlm
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        restart: unless-stopped
        ports:
            - 8147:8080

    # stanza (ports: 819x)
    stanza-nl:
        image: ccl-kuleuven/taggers-dockerized-stanza:${VERSION}
        restart: unless-stopped
        environment:
            - STANZA_LANG=nl
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        ports:
            - 8190:8080
    stanza-en:
        image: ccl-kuleuven/taggers-dockerized-stanza:${VERSION}
        restart: unless-stopped
        environment:
            - STANZA_LANG=en
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        ports:
            - 8191:8080
    stanza-fr:
        image: ccl-kuleuven/taggers-dockerized-stanza:${VERSION}
        restart: unless-stopped
        environment:
            - STANZA_LANG=fr
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        ports:
            - 8192:8080
    stanza-de:
        image: ccl-kuleuven/taggers-dockerized-stanza:${VERSION}
        restart: unless-stopped
        environment:
            - STANZA_LANG=de
            - CALLBACK_SERVER=${CALLBACK_SERVER}
        ports:
            - 8193:8080
networks:
    taggers-network:
        # external applications can attach to this network to access the taggers 
        driver: bridge

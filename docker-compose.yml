services:
    # spacy (ports: 812x)
    spacy-nl-lg:
        image: cclkuleuven/taggers-dockerized-spacy-nl-lg:${APP_VERSION}
        build:
            context: spacy/base
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=nl_core_news_lg
        restart: unless-stopped
        ports:
            - 8120:8080

    spacy-en-lg:
        image: cclkuleuven/taggers-dockerized-spacy-en-lg:${APP_VERSION}
        build:
            context: spacy/base
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=en_core_web_lg
        restart: unless-stopped
        ports:
            - 8121:8080

    spacy-fr-lg:
        image: cclkuleuven/taggers-dockerized-spacy-fr-lg:${APP_VERSION}
        build:
            context: spacy/base
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=fr_core_news_lg
        restart: unless-stopped
        ports:
            - 8122:8080

    spacy-de-lg:
        image: cclkuleuven/taggers-dockerized-spacy-de-lg:${APP_VERSION}
        build:
            context: spacy/base
        networks:
            - taggers-network
        environment:
            - CALLBACK_SERVER=${CALLBACK_SERVER}
            - SPACY_MODEL=de_core_news_lg
        restart: unless-stopped
        ports:
            - 8123:8080
            
